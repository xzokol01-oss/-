<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lua Pastefy Uploader</title>
</head>

<body style="background:#111;color:#0f0;font-family:monospace;padding:20px">

<h3>Lua Pastefy Uploader</h3>

<textarea id="t" style="width:100%;height:200px;background:#000;color:#0f0" placeholder="ضع السكربت هنا..."></textarea>

<br><br>

<button onclick="go()" style="width:49%;padding:10px">Upload</button>
<button onclick="copy()" style="width:49%;padding:10px">Copy</button>

<pre id="o" style="background:#000;padding:10px"></pre>

<script>

async function go(){

    let s = t.value
    if(!s) return alert("اكتب سكربت أولاً")

    try{
        o.innerText = "جاري الرفع..."

        // رفع السكربت الأصلي بدون أي لعب أو تشفير
        let res = await fetch("https://pastefy.app/api/v2/paste",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                content: s,
                title: "Lua Script",
                visibility: "UNLISTED"
            })
        })

        let data = await res.json()

        // تركيب الرابط المباشر بالضبط مثل ما طلبت
        let raw = "https://pastefy.app/" + data.paste.id + "/raw"

        o.innerText = `loadstring(game:HttpGet("${raw}"))()`

    }catch(e){
        o.innerText = "Error: " + e
    }
}

function copy(){
    navigator.clipboard.writeText(o.innerText)
    alert("تم النسخ")
}

</script>

</body>
</html>
