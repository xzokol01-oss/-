<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lua Layer Obfuscator</title>
</head>

<body style="background:#111;color:#0f0;font-family:monospace;padding:20px">

<h3>Lua Layer Obfuscator</h3>

<textarea id="t" style="width:100%;height:200px;background:#000;color:#0f0"></textarea>

<br><br>

<button onclick="go()" style="width:49%;padding:10px">Encrypt + Upload</button>
<button onclick="copy()" style="width:49%;padding:10px">Copy</button>

<pre id="o" style="background:#000;padding:10px"></pre>

<script>

function obf(s){
    let parts = []
    for(let i=0;i<s.length;i++){
        parts.push("string.char(" + s.charCodeAt(i) + ")")
    }
    return parts.join("..")
}

// طبقة وهمية (شكل تشويش)
function wrap(code){
    return "loadstring(loadstring(loadstring(" + code + ")))()"
}

async function go(){

    let s = t.value
    if(!s) return alert("اكتب سكربت")

    let encoded = obf(s)

    let layered = wrap(encoded)

    try{

        let res = await fetch("https://pastefy.app/api/v2/paste",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                content: layered,
                title:"Lua Layer Obf",
                visibility:"UNLISTED"
            })
        })

        let data = await res.json()

        let raw = "https://pastefy.app/" + data.paste.id + "/raw"

        o.innerText =
`loadstring(game:HttpGet("${raw}"))()`

    }catch(e){
        o.innerText = "Error: " + e
    }
}

function copy(){
    navigator.clipboard.writeText(o.innerText)
    alert("تم النسخ")
}

</script>

</body>
</html>
