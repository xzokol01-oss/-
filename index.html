<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lua Generator Test</title>
</head>

<body style="background:#0f0f0f;color:#00ff88;font-family:monospace;padding:20px">

<h2>Lua Loadstring Generator</h2>

<textarea id="script" style="width:100%;height:200px;background:#111;color:#0f0;border:1px solid #333;padding:10px"></textarea>

<br><br>

<button onclick="generate()" style="width:100%;padding:12px;background:#00ff88;border:none;font-weight:bold;cursor:pointer">
Generate
</button>

<pre id="out" style="margin-top:20px;background:#111;padding:15px;word-break:break-all"></pre>

<script>
function generate(){

    const script = document.getElementById("script").value;

    if(!script){
        document.getElementById("out").innerText = "اكتب سكربت أول";
        return;
    }

    // fake id للتجربة فقط
    const id = Math.random().toString(36).substring(2, 8);

    // رابط وهمي
    const url = "https://example.com/raw/" + id;

    // الناتج النهائي
    const result = `loadstring(game:HttpGet("${url}"))()`;

    document.getElementById("out").innerText = result;
}
</script>

</body>
</html>
