<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lua Loadstring Generator</title>
</head>

<body style="background:#0f0f0f;color:#00ff88;font-family:monospace;padding:20px">

<h2>Lua Loadstring Generator</h2>

<p>اكتب السكربت:</p>

<textarea id="input" style="width:100%;height:200px;background:#111;color:#0f0;border:1px solid #333;padding:10px"></textarea>

<br><br>

<button onclick="generate()" style="width:100%;padding:12px;background:#00ff88;border:none;font-weight:bold;cursor:pointer">
Generate
</button>

<pre id="output" style="margin-top:20px;background:#111;padding:15px;word-break:break-all"></pre>

<script>
function generate(){
    const script = document.getElementById("input").value;

    if(!script){
        document.getElementById("output").innerText = "اكتب سكربت أول";
        return;
    }

    // نحفظ السكربت داخل الصفحة (مو سيرفر حقيقي)
    const id = Math.random().toString(36).slice(2,8);

    // رابط وهمي للتجربة فقط
    const fakeUrl = location.href + "#raw/" + id;

    const result = `loadstring(game:HttpGet("${fakeUrl}"))()`;

    document.getElementById("output").innerText = result;
}
</script>

</body>
</html>
